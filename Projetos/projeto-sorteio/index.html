<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteador</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    
    <img src="assets/sort 1.png" alt="">
    

    <main>
        <label>Sortear um número</label>
        <div class="div-main">
            <input class="starting-number" type="text" placeholder="entre">
            <input class="end-number" type="text" placeholder="e">
        </div>
        <div class="div-button">
            <button class="button-draw">Sortear</button>
        </div>
    </main>

    <p class="result">Resultado</p>

<script src="scripts.js"></script>
</body>
</html>
