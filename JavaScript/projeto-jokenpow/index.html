<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JokenPow</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
            <h1>JokenPow</h1>
            <div class="item-button">
                <button class="button-style" id="rock" onclick="playHuman('rock')">&#x1F44A</button>
                <button class="button-style" id="paper" onclick="playHuman('paper')">&#x1f590</button>
                <button class="button-style" id="scissor" onclick="playHuman('scissor')">&#x270c</button>
            </div>

            <p class="result"></p>
            
        <div class="wrapper-p">
            <p>Escolha da Maquina: <span class="option-machine"></span></p>
            <p>Sua Escolha: <span class="option-human"></span></p>
            <p>Empates: <span id="draw-score">0</span></p>
            <p>Sua pontuação: <span id="humanScore">0</span></p>
            <p>Pontuação da alexa: <span id="machineScore">0</span></p>
        </div>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
