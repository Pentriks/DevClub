<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <!-- 
    Forms
    Forms are used to collect user input. They can contain various types of input elements, such as text fields, checkboxes, radio buttons, and submit buttons.
    A form is defined using the <form> element, which can contain various input elements.
    The <form> element has several attributes, including:
    - action: Specifies the URL to which the form data will be sent when the form is submitted.
    - method: Specifies the HTTP method to use when submitting the form, such as GET or POST.
    - enctype: Specifies the encoding type for the form data, such as application/x-www-form-urlencoded or multipart/form-data. 
    -->
    <h1>Forms</h1>
    <form action="/submit" method="get" enctype="multipart/form-data">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name"><br><br>
        
        <label for="email">Email:</label>
        <input type="email" id="email" name="email"><br><br>
        
        <label for="password">Password:</label>
        <input type="password" id="password" name="password"><br><br>

        <label for="file">File:</label>
        <input type="file" id="file" name="file"><br></label>
        
        <button type="reset">Reset</button>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
