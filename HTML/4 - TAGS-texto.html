

<!--  Principais TAG'S para textos -->

<!--  Títulos -->
<h1> Se trata do titulo mais importante do seu site </h1>
<h2> Título 2 </h2> 
<h3> Título 3 </h3>
<h4> Título 4 </h4>
<h5> Título 5 </h5>
<h6> Título 6 </h6>

<p> <b> Parágrafo </b> </p>
<br> <!-- Quebra de linha, para pular uma linha -->
<hr> <!-- Linha horizontal, para separar conteúdos -->
<p> <i>Posso colocar mais de um parágrafo</i> </p>
<br>
<p> <strong> Parágrafo </strong> <!-- A tag strong faz o mesmo que a tag b, porém além de deixar o texto mais forte, ela também ajuda o SEO --> </p>
