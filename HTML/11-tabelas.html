<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
</head>
<body>
    <!-- Tabela de Preços -->
    <h2>Tabela de Preços</h2>
    <table border="4" cellpadding="10" cellspacing="0" bordercolor="blue">
        <tr>
            <th>Produto</th>
            <th>Preço</th>
        </tr>
        <tr>
            <td>Produto A</td>
            <td>$10</td>
        </tr>
        <tr>
            <td>Produto B</td>
            <td>$20</td>
        </tr>
        <tr>
            <td>Produto C</td>
            <td>$30</td>
        </tr>
    </table>
</body>
</html>
