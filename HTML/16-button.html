<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--
    Button

    -type: Specifies the type of button, such as submit, reset, or button.
    -disabled: Specifies that the button is disabled and cannot be clicked.

    The <button> element can be used to create various types of buttons, including submit buttons, reset buttons, and regular buttons. The type attribute specifies the behavior of the button when it is clicked. For example, a submit button will submit a form, while a reset button will reset the form fields to their default values. A regular button does not have any default behavior and can be used for custom actions with JavaScript.
    -->
    <button type="button">Click Me!</button>
    <button type="submit">Submit</button>
    <button type="reset">Reset</button>
    <button type="button" disabled>Disabled Button</button>
</body>
</html>
