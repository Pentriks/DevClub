<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Semântico</title>
</head>
<body>
    <!-- 
    HTML Semântico

    - Elementos semânticos ajudam a definir a estrutura e a hierarquia do conteúdo, tornando-o mais facil de ler e entender. Eles também melhoram a acessibilidade e a otimização para mecanismos de busca (SEO).
    - Alguns exemplos de elementos semânticos incluem:
        - <header>: Representa o cabeçalho de um documento ou seção.
        - <nav>: Representa uma seção de navegação.
        - <main>: Representa o conteúdo principal do documento.
        - <section>: Representa uma seção genérica de conteúdo.
        - <article>: Representa um artigo independente dentro do documento.
        - <aside>: Representa conteúdo relacionado, mas não essencial ao conteúdo principal.
        - <footer>: Representa o rodapé de um documento ou seção.
        - <div>: Representa um bloco de conteúdo semântico.
    -->

    <header></header>
    <nav></nav>
    <main></main>
    <section></section>
    <article></article> 
    <aside></aside>
    <footer></footer>
    <div></div>
</body>
</html>
