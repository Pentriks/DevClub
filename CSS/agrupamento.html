<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="agrupamento.css">
    <title>Agrupamento de Seletores</title>
</head>
<body>
    <h1 class="titulo">Agrupamento de Seletores</h1>
    <p>O agrupamento de seletores é uma técnica utilizada em CSS para aplicar as mesmas regras de estilo a múltiplos elementos. Isso é feito separando os seletores por vírgulas. Por exemplo:</p>
    <button class="botao">Clique aqui</button>
    <button class="botao">Pressione aqui</button>
</body>
</html>
