<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS</title>
</head>
<body>
    <h1>CSS</h1>
    <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Atque, dolore sit porro quibusdam dolores, unde ratione officia, quaerat illo ipsum quasi tenetur? Amet nesciunt aliquam laboriosam expedita tempore optio est!</p>
    <button>Clique</button>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            color: #333;
            padding: 20px;
        }
        h1 {
            color: #007BFF;
        }
        p {
            font-size: 18px;
            line-height: 1.6;
        }
        button {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</body>
</html>
